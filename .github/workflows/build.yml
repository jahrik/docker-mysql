---
name: Build

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test building image.
        run: docker build -t test-image .

      - name: Run the built image.
        run: docker run --name test-container -d -e MARIADB_ROOT_PASSWORD=test test-image

      - name: Verify MariaDB comes up healthy.
        run: |
          for i in $(seq 1 30); do
            docker exec test-container healthcheck.sh --connect --innodb_initialized && exit 0
            sleep 2
          done
          docker logs test-container
          exit 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image.
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jahrik/mysql:latest
